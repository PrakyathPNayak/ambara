services:
  # ---------------------------------------------------------------------------
  # Ollama — local LLM inference server
  # Starts the server, then pulls qwen2.5:7b (fits in 6 GB VRAM on RTX 4050)
  # For GPU passthrough:  docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
  # CPU-only:             docker compose up
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ambara-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "
        /bin/ollama serve &
        SERVE_PID=$$!
        echo '[ambara] Waiting for Ollama server to be ready...'
        until /bin/ollama list > /dev/null 2>&1; do sleep 2; done
        echo '[ambara] Pulling qwen2.5:7b (this may take a while on first run)...'
        /bin/ollama pull qwen2.5:7b
        echo '[ambara] Model ready. Serving.'
        wait $$SERVE_PID
      "
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Ambara chatbot sidecar (Python FastAPI)
  # ---------------------------------------------------------------------------
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile.chatbot
    container_name: ambara-chatbot
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8765:8765"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - AMBARA_LLM_BACKEND=ollama
      # Uncomment and set these to use a cloud LLM instead of Ollama:
      # - GROQ_API_KEY=${GROQ_API_KEY}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./src:/app/src:ro
      - ./chatbot:/app/chatbot
      - ./build:/app/build

volumes:
  ollama_data:
