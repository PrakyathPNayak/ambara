version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # Ollama — local LLM inference server with GPU passthrough
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ambara-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Model bootstrap — pulls the best model for RTX 4050 (6 GB usable VRAM)
  # qwen2.5:7b is a strong 7B parameter model that fits in ~5 GB VRAM
  # ---------------------------------------------------------------------------
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ambara-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "
        ollama pull qwen2.5:7b &&
        echo '✓ qwen2.5:7b ready'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434

  # ---------------------------------------------------------------------------
  # Ambara chatbot sidecar (Python FastAPI)
  # ---------------------------------------------------------------------------
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile.chatbot
    container_name: ambara-chatbot
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8765:8765"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - AMBARA_LLM_BACKEND=ollama
      # Uncomment and set these to use a cloud LLM instead of Ollama:
      # - GROQ_API_KEY=${GROQ_API_KEY}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./src:/app/src:ro
      - ./chatbot:/app/chatbot
      - ./build:/app/build

volumes:
  ollama_data:
