name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install tauri system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            build-essential \
            curl \
            wget \
            file

      - name: cargo test --workspace --lib
        run: cargo test --workspace --lib --no-fail-fast

      - name: cargo test --doc
        run: cargo test --doc --no-fail-fast

      - name: cargo clippy --workspace (deny warnings)
        run: cargo clippy --all-targets --workspace -- -D warnings

  ui:
    name: UI (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Run vitest
        working-directory: ui
        run: npm test

  chatbot:
    name: Chatbot (pytest)
    runs-on: ubuntu-latest
    env:
      AMBARA_FORCE_MOCK_LLM: "1"
      # Keep CI deterministic: never reach out to a real LLM provider.
      ANTHROPIC_API_KEY: ""
      GROQ_API_KEY: ""
      OPENAI_API_KEY: ""
      OLLAMA_HOST: ""
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: chatbot/requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: hf-cache-${{ runner.os }}-${{ hashFiles('chatbot/requirements.txt') }}
          restore-keys: |
            hf-cache-${{ runner.os }}-

      - name: Install chatbot dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r chatbot/requirements.txt
          pip install pytest

      - name: Run pytest
        run: pytest chatbot/tests -q --maxfail=5
